syntax = "proto3";

option csharp_namespace = "OhMyBot.Contracts.Grpc";

package ohmybot.v2;

service CommandRouter {
  rpc ExecuteCommand (CommandRequest) returns (CommandResponse);
  rpc ExecuteCallback (CallbackRequest) returns (CommandResponse);
  rpc GetRoutes (GetRoutesRequest) returns (GetRoutesResponse);
  rpc RecordUserProfile (UserProfileRequest) returns (UserProfileResponse);
  rpc OpenAdminConsole (stream AdminConsoleInput) returns (stream AdminConsoleOutput);
}

enum BotPlatform {
  BOT_PLATFORM_UNSPECIFIED = 0;
  BOT_PLATFORM_TELEGRAM = 1;
  BOT_PLATFORM_QQ = 2;
}

enum BotChatType {
  BOT_CHAT_TYPE_UNSPECIFIED = 0;
  BOT_CHAT_TYPE_PRIVATE = 1;
  BOT_CHAT_TYPE_GROUP = 2;
}

enum UserPrivilege {
  USER_PRIVILEGE_USER = 0;
  USER_PRIVILEGE_VERIFIED_USER = 1;
  USER_PRIVILEGE_ADMIN = 10;
  USER_PRIVILEGE_OWNER = 100;
}

enum CommandResponseDataKind {
  COMMAND_RESPONSE_DATA_KIND_UNSPECIFIED = 0;
  COMMAND_RESPONSE_DATA_KIND_TEXT = 1;
  COMMAND_RESPONSE_DATA_KIND_PING = 2;
  COMMAND_RESPONSE_DATA_KIND_LINK_TOKEN = 3;
  COMMAND_RESPONSE_DATA_KIND_LINK_RESULT = 4;
  COMMAND_RESPONSE_DATA_KIND_USER_INFO = 5;
  COMMAND_RESPONSE_DATA_KIND_AI_ROUTER_ACCOUNT_LIST = 6;
  COMMAND_RESPONSE_DATA_KIND_AI_ROUTER_BIND_RESULT = 7;
  COMMAND_RESPONSE_DATA_KIND_AI_ROUTER_SIGN_RESULT = 8;
  COMMAND_RESPONSE_DATA_KIND_NOTIFY_TYPE_PANEL = 9;
  COMMAND_RESPONSE_DATA_KIND_NOTIFY_ACCOUNT_PANEL = 10;
  COMMAND_RESPONSE_DATA_KIND_KURO_ACCOUNT_LIST = 11;
  COMMAND_RESPONSE_DATA_KIND_KURO_BIND_RESULT = 12;
  COMMAND_RESPONSE_DATA_KIND_KURO_BBS_SIGN_RESULT = 13;
  COMMAND_RESPONSE_DATA_KIND_KURO_GAME_SIGN_RESULT = 14;
}

message CommandRequest {
  BotPlatform platform = 1;
  string bot_instance_id = 2;
  string chat_id = 3;
  string user_id = 4;
  string message_id = 5;
  string command = 6;
  repeated string args = 7;
  string display_name = 8;
  string username = 9;
  BotChatType chat_type = 10;
  string first_name = 11;
  string last_name = 12;
  string nickname = 13;
  string reply_to_user_id = 14;
}

message CallbackRequest {
  BotPlatform platform = 1;
  string bot_instance_id = 2;
  string chat_id = 3;
  string user_id = 4;
  string message_id = 5;
  string callback_query_id = 6;
  string payload = 7;
}

message GetRoutesRequest {
  BotPlatform platform = 1;
  string bot_instance_id = 2;
  int64 current_version = 3;
}

message UserProfileRequest {
  BotPlatform platform = 1;
  string bot_instance_id = 2;
  string uid = 3;
  string username = 4;
  string first_name = 5;
  string last_name = 6;
  string nickname = 7;
}

message UserProfileResponse {
  bool recorded = 1;
}

message AdminConsoleInput {
  string command_line = 1;
}

message AdminConsoleTextSegment {
  string text = 1;
  optional int32 foreground_color = 2;
  optional int32 background_color = 3;
}

message AdminConsoleOutput {
  repeated AdminConsoleTextSegment segments = 1;
}

message RouteDescriptor {
  string command = 1;
  string core_command = 2;
  string description = 3;
  string usage = 4;
  UserPrivilege required_privilege = 5;
  int32 support_platforms = 6;
  bool enabled = 7;
  repeated string aliases = 8;
  int32 support_chat_types = 9;
}

message GetRoutesResponse {
  repeated RouteDescriptor routes = 1;
  int64 version = 2;
  bool not_modified = 3;
}

message ResponseMessage {
  string text = 1;
}

message ResponseButton {
  string text = 1;
  string payload = 2;
}

message ResponseButtonRow {
  repeated ResponseButton buttons = 1;
}

message CommandError {
  string code = 1;
  string message = 2;
}

message CommandResponseContext {
  int64 caller_core_user_id = 1;
  UserPrivilege caller_privilege = 2;
  BotPlatform platform = 3;
}

message TextData {
  string text = 1;
}

message PingData {
  int64 elapsed_ms = 1;
}

message LinkTokenData {
  string token = 1;
  int32 ttl_seconds = 2;
}

message LinkResultData {
  string status = 1;
  int64 core_user_id = 2;
}

message PlatformIdentityData {
  BotPlatform platform = 1;
  string uid = 2;
  string display_name = 3;
  string username = 4;
}

message UserInfoData {
  bool self = 1;
  UserPrivilege privilege = 2;
  optional int64 core_user_id = 3;
  repeated PlatformIdentityData identities = 4;
}

message AiRouterAccountItem {
  int64 id = 1;
  string login_email = 2;
  string display_name = 3;
  bool auto_sign_enabled = 4;
  bool notification_enabled = 5;
}

message AiRouterAccountListData {
  repeated AiRouterAccountItem accounts = 1;
}

message AiRouterBindResultData {
  int64 account_id = 1;
  string login_email = 2;
  string display_name = 3;
}

message AiRouterSignResultData {
  string login_email = 1;
  string display_name = 2;
  string status = 3;
  string message = 4;
  string today_reward = 5;
  int64 current_streak = 6;
  string total_reward = 7;
  int64 month_signed_days = 8;
  bool token_refreshed = 9;
  int64 occurred_at_unix_seconds = 10;
  bool auto_sign = 11;
}

message NotifyTypeItem {
  string type = 1;
  string display_name = 2;
  bool enabled = 3;
}

message NotifyTypePanelData {
  repeated NotifyTypeItem items = 1;
}

message NotifyAccountPanelData {
  string type = 1;
  string display_name = 2;
  repeated AiRouterAccountItem accounts = 3;
  repeated KuroAccountItem kuro_accounts = 4;
}

message KuroGameRoleItem {
  int64 id = 1;
  int64 game_id = 2;
  string game_name = 3;
  string server_id = 4;
  string server_name = 5;
  int64 role_id = 6;
  string role_name = 7;
  string game_level = 8;
  bool auto_sign_enabled = 9;
}

message KuroAccountItem {
  int64 id = 1;
  int64 bbs_user_id = 2;
  string display_name = 3;
  bool auto_sign_enabled = 4;
  int64 bbs_task_flags = 5;
  bool notification_enabled = 6;
  repeated KuroGameRoleItem roles = 7;
}

message KuroAccountListData {
  repeated KuroAccountItem accounts = 1;
}

message KuroBindResultData {
  KuroAccountItem account = 1;
  bool updated_existing = 2;
}

message KuroBbsTaskProgressItem {
  string remark = 1;
  int64 complete_times = 2;
  int64 need_action_times = 3;
  int64 gain_gold = 4;
  bool finished = 5;
}

message KuroBbsSignResultData {
  KuroAccountItem account = 1;
  repeated KuroBbsTaskProgressItem progress = 2;
  repeated string lines = 3;
  bool auto_sign = 4;
  int64 occurred_at_unix_seconds = 5;
}

message KuroGameSignResultData {
  KuroAccountItem account = 1;
  repeated string lines = 2;
  bool auto_sign = 3;
  int64 occurred_at_unix_seconds = 4;
}

message CommandResponse {
  int32 code = 1;
  string error_code = 2;
  string message = 3;
  CommandResponseDataKind data_kind = 4;
  CommandResponseContext context = 5;
  repeated ResponseButton buttons = 6;
  string reply_to_message_id = 7;
  optional string edit_message_id = 8;
  repeated ResponseButtonRow button_rows = 9;
  string callback_answer_text = 10;
  bool callback_answer_alert = 11;
  oneof data {
    TextData text = 20;
    PingData ping = 21;
    LinkTokenData link_token = 22;
    LinkResultData link_result = 23;
    UserInfoData user_info = 24;
    AiRouterAccountListData ai_router_account_list = 25;
    AiRouterBindResultData ai_router_bind_result = 26;
    AiRouterSignResultData ai_router_sign_result = 27;
    NotifyTypePanelData notify_type_panel = 28;
    NotifyAccountPanelData notify_account_panel = 29;
    KuroAccountListData kuro_account_list = 30;
    KuroBindResultData kuro_bind_result = 31;
    KuroBbsSignResultData kuro_bbs_sign_result = 32;
    KuroGameSignResultData kuro_game_sign_result = 33;
  }
}

message NotificationEvent {
  BotPlatform platform = 1;
  string bot_instance_id = 2;
  string chat_id = 3;
  repeated ResponseMessage messages = 4;
  repeated ResponseButton buttons = 5;
}
